[phases.setup]
nixPkgs = ["pkgs.python311", "pkgs.nodejs-20_x", "pkgs.npm"]

providers = ["python", "node"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd web && npm install",
]

[phases.build]
cmds = [
    "cd web && VITE_API_BASE_URL='' npm run build",
]

[start]
cmd = "uvicorn prattern.api.server:app --host 0.0.0.0 --port $PORT"
