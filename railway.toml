[build]
builder = "nixpacks"
nixpacksPlan = '''
[phases.setup]
nixPkgs = ["python311", "nodejs_20", "npm"]

[phases.install]
cmds = ["pip install -r requirements.txt", "cd web && npm install"]

[phases.build]
cmds = ["cd web && VITE_API_BASE_URL='' npm run build"]
'''

[deploy]
startCommand = "uvicorn prattern.api.server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
